<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FDA Cosmetics Claim Checker · FDA 화장품 클레임 체커</title>
<style>
  :root{
    --bg:#FAFAF8; --surface:#FFFFFF; --ink:#1C1917; --ink2:#57534E; --ink3:#A8A29E;
    --line:#E7E5E4; --line2:#F5F5F4; --accent:#A23E5E; --accent-soft:#FBEEF2;
    --high:#DC2626; --high-bg:#FEF2F2; --high-tx:#B91C1C;
    --med:#D97706; --med-bg:#FFFBEB; --med-tx:#B45309;
    --low:#CA8A04; --low-bg:#FEFCE8; --low-tx:#A16207;
    --ok:#059669; --ok-bg:#ECFDF5; --ok-tx:#047857;
    --r:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    line-height:1.55; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:28px 18px 56px}
  @media(min-width:640px){.wrap{padding:40px 24px 64px}}

  /* header */
  header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:20px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:9px;margin-bottom:6px}
  .logo{width:30px;height:30px;border-radius:9px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .logo svg{width:17px;height:17px}
  h1{font-family:Georgia,"Times New Roman",serif;font-size:25px;letter-spacing:-.4px;margin:0;font-weight:600}
  .sub-h{font-size:13.5px;color:var(--ink2);max-width:560px;margin:0}

  /* language toggle */
  .seg{display:inline-flex;border:1px solid var(--line);background:var(--surface);border-radius:999px;overflow:hidden;font-size:12px;flex:0 0 auto}
  .seg button{border:0;background:transparent;color:var(--ink3);padding:7px 13px;cursor:pointer;font:inherit;font-size:12px;transition:.15s}
  .seg button:hover{background:var(--line2)}
  .seg button.on{background:var(--ink);color:#fff}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .pad{padding:18px}
  .row{display:flex;align-items:center;gap:8px}

  /* key panel */
  .keybar{margin-bottom:14px;padding:14px 16px}
  .keybar .top{display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer}
  .keytitle{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--ink3)}
  .dot.set{background:var(--ok)}
  .status{font-size:12px;color:var(--ink3)}
  .keybody{margin-top:13px;display:none}
  .keybody.open{display:block}
  .keyrow{display:flex;gap:8px;flex-wrap:wrap}
  input[type=password],input[type=text]{
    flex:1 1 220px;min-width:0;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font:inherit;font-size:13.5px;background:#fff;color:var(--ink);outline:none
  }
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .keynote{font-size:11.5px;color:var(--ink3);margin:9px 0 0;line-height:1.5}
  .keynote a{color:var(--accent)}

  button.btn{border:0;border-radius:10px;padding:9px 15px;font:inherit;font-size:13.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:.15s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{filter:brightness(1.06)}
  .btn-primary:disabled{opacity:.55;cursor:default;filter:none}
  .btn-ghost{background:transparent;color:var(--ink2)}
  .btn-ghost:hover{background:var(--line2)}
  .btn-line{background:var(--surface);color:var(--ink2);border:1px solid var(--line)}
  .btn-line:hover{background:var(--line2)}
  .btn svg{width:15px;height:15px}

  /* dropzone */
  .drop{border:2px dashed var(--line);border-radius:13px;padding:46px 20px;text-align:center;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:8px}
  .drop:hover{border-color:var(--ink3);background:var(--line2)}
  .drop.over{border-color:var(--accent);background:var(--accent-soft)}
  .drop svg{width:24px;height:24px;color:var(--ink3)}
  .drop .t{font-size:13.5px;font-weight:600;color:var(--ink)}
  .drop .h{font-size:12px;color:var(--ink3)}

  /* preview */
  .preview{display:flex;gap:16px;flex-wrap:wrap}
  .thumb{position:relative;flex:0 0 auto}
  .thumb img{width:160px;height:170px;object-fit:contain;background:var(--line2);border:1px solid var(--line);border-radius:13px}
  .thumb img.tall{object-fit:cover;object-position:top}
  .rm{position:absolute;top:-9px;right:-9px;width:24px;height:24px;border-radius:50%;background:var(--ink);color:#fff;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .rm svg{width:13px;height:13px}
  .badge{position:absolute;left:7px;bottom:7px;background:rgba(28,25,23,.82);color:#fff;font-size:10px;font-weight:600;padding:3px 6px;border-radius:6px;display:flex;align-items:center;gap:4px}
  .badge svg{width:10px;height:10px}
  .pv-right{flex:1 1 240px;min-width:0;display:flex;flex-direction:column;justify-content:space-between;gap:13px}
  .field-label{font-size:11.5px;font-weight:600;color:var(--ink2);display:block;margin-bottom:5px}

  /* error */
  .err{margin-top:16px;display:flex;gap:11px;align-items:flex-start;border:1px solid #FCA5A5;background:var(--high-bg);border-radius:var(--r);padding:15px}
  .err svg{width:18px;height:18px;color:var(--high);flex:0 0 auto;margin-top:1px}
  .err .et{font-weight:600;color:var(--high-tx);font-size:13.5px}
  .err .em{color:#B91C1C;font-size:13px;margin-top:2px;word-break:break-word}

  /* results */
  .results{margin-top:20px;display:none;flex-direction:column;gap:16px}
  .verdict{overflow:hidden}
  .vbar{height:6px}
  .vbody{display:flex;gap:12px;align-items:flex-start;padding:17px 18px}
  .vicon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .vicon svg{width:18px;height:18px}
  .micro{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3)}
  .pill{display:inline-block;border-radius:999px;padding:2px 9px;font-size:11px;font-weight:700}
  .vsum{font-size:13.5px;color:var(--ink);margin:4px 0 0}

  h2.sec{font-family:Georgia,serif;font-size:18px;font-weight:600;margin:2px 0 0;display:flex;align-items:center;gap:9px}
  .count{background:var(--line);color:var(--ink2);border-radius:999px;font-family:-apple-system,sans-serif;font-size:12px;font-weight:600;padding:1px 9px}

  .claim{border-left:4px solid var(--line);padding:16px;margin-top:0}
  .claim .chead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .redline{display:grid;grid-template-columns:1fr auto 1fr;gap:9px;align-items:stretch}
  @media(max-width:560px){.redline{grid-template-columns:1fr}.arrow{display:none}}
  .box{border-radius:10px;padding:11px}
  .box .bl{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
  .box-orig{border:1px solid var(--line);background:var(--line2)}
  .box-orig .bl{color:var(--ink3)}
  .box-orig p{margin:0;font-size:13.5px;color:var(--ink2);text-decoration:line-through;text-decoration-color:var(--ink3)}
  .arrow{display:flex;align-items:center;justify-content:center}
  .arrow svg{width:16px;height:16px;color:var(--ink3)}
  .box-new{border:1px solid #A7F3D0;background:var(--ok-bg)}
  .box-new .bl{color:var(--ok)}
  .box-new p{margin:0;font-size:13.5px;font-weight:600;color:#065F46}
  .expl{margin-top:12px;font-size:13px}
  .expl .li{color:var(--ink2);margin:0 0 5px}
  .expl .li b{color:var(--ink)}
  .expl .basis{color:var(--ink3);font-size:12px;margin:0}
  .sub{display:block;color:var(--ink3);font-size:12.5px;margin-top:2px}

  .tips ul{margin:8px 0 0;padding:0;list-style:none}
  .tips li{display:flex;gap:9px;font-size:13px;color:var(--ink2);margin-bottom:7px}
  .tips li::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--accent);flex:0 0 auto;margin-top:8px}

  .ok-card{display:flex;gap:9px;align-items:center;border:1px solid #A7F3D0;background:var(--ok-bg);border-radius:var(--r);padding:16px;color:var(--ok-tx);font-size:13.5px}
  .ok-card svg{width:18px;height:18px}

  .disc{margin-top:34px;border-top:1px solid var(--line);padding-top:16px;display:flex;gap:8px;align-items:flex-start;font-size:11px;color:var(--ink3);line-height:1.55}
  .disc svg{width:13px;height:13px;flex:0 0 auto;margin-top:2px}
  .spin{animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .chk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink2);cursor:pointer;user-select:none}
  .chk input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
  .dlink{color:var(--accent);text-decoration:none;font-weight:600}
  .dlink:hover{text-decoration:underline}
  .dstatus{font-size:12.5px;margin-top:11px;color:var(--ink2);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .savebar{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .hidden{display:none!important}
</style>
</head>

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function tr(k){ return STR[k][state.lang==="en"?"en":"ko"]; }
function bi(ko,en){
  if(state.lang==="ko") return esc(ko);
  if(state.lang==="en") return esc(en);
  return esc(ko)+(en?('<span class="sub">'+esc(en)+"</span>"):"");
}

function readAsDataURL(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result);};r.onerror=function(){rej(new Error("read"));};r.readAsDataURL(file);});}
function loadImage(src){return new Promise(function(res,rej){var im=new Image();im.onload=function(){res(im);};im.onerror=function(){rej(new Error("decode"));};im.src=src;});}
function jpeg(c){return c.toDataURL("image/jpeg",QUALITY).split(",")[1];}

function prepareImage(file){
  return readAsDataURL(file).then(function(dataUrl){
    return loadImage(dataUrl).then(function(img){
      var scale = img.width>MAX_W ? MAX_W/img.width : 1;
      var w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      var slices=[], sliceH=SLICE_H;
      if(Math.ceil(h/sliceH)>MAX_SLICES) sliceH=Math.ceil(h/MAX_SLICES);
      if(h<=sliceH){
        var c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);slices.push(jpeg(c));
      }else{
        for(var y=0;y<h;y+=sliceH-OVERLAP){
          var sh=Math.min(sliceH,h-y);
          if(sh<=OVERLAP&&y>0)break;
          var cv=document.createElement("canvas");cv.width=w;cv.height=sh;
          cv.getContext("2d").drawImage(img,0,y/scale,img.width,sh/scale,0,0,w,sh);
          slices.push(jpeg(cv));
          if(slices.length>=MAX_SLICES)break;
        }
      }
      return {preview:dataUrl,slices:slices,mediaType:"image/jpeg",name:file.name||"image",sliceCount:slices.length,w:img.width,h:img.height};
    });
  });
}

/* ---------- resilient JSON parse ---------- */
function extractObjects(arrText){
  var objs=[],i=0;
  while(i<arrText.length){
    while(i<arrText.length&&arrText[i]!=="{"&&arrText[i]!=="]")i++;
    if(i>=arrText.length||arrText[i]==="]")break;
    var depth=0,start=i,inStr=false,esc2=false,j=i;
    for(;j<arrText.length;j++){
      var ch=arrText[j];
      if(inStr){if(esc2)esc2=false;else if(ch==="\\")esc2=true;else if(ch==='"')inStr=false;}
      else if(ch==='"')inStr=true;
      else if(ch==="{")depth++;
      else if(ch==="}"){depth--;if(depth===0){j++;break;}}
    }
    if(depth===0&&j>start){try{objs.push(JSON.parse(arrText.slice(start,j)));}catch(e){}i=j;}
    else break;
  }
  return objs;
}
function strArray(text,key){
  var m=text.match(new RegExp('"'+key+'"\\s*:\\s*\\[([\\s\\S]*?)\\]'));
  if(!m)return [];
  var out=[],re=/"((?:[^"\\]|\\.)*)"/g,x;
  while((x=re.exec(m[1]))!==null){try{out.push(JSON.parse('"'+x[1]+'"'));}catch(e){}}
  return out;
}
function parseChunk(text){
  var t=(text||"").replace(/```json/gi,"").replace(/```/g,"").trim();
  var a=t.indexOf("{"); if(a!==-1)t=t.slice(a);
  try{var b=t.lastIndexOf("}");if(b!==-1){var o=JSON.parse(t.slice(0,b+1));return {claims:o.claims||[],tips_ko:o.tips_ko||[],tips_en:o.tips_en||[]};}}catch(e){}
  var claims=[],ci=t.indexOf('"claims"');
  if(ci!==-1){var lb=t.indexOf("[",ci);if(lb!==-1)claims=extractObjects(t.slice(lb+1));}
  return {claims:claims,tips_ko:strArray(t,"tips_ko"),tips_en:strArray(t,"tips_en")};
}

/* ---------- API ---------- */
// If you set APP_ACCESS_TOKEN on the server, put the same value here to gate requests.
var APP_TOKEN = "";
function callApi(content){
  var headers={"Content-Type":"application/json"};
  if(APP_TOKEN) headers["x-app-token"]=APP_TOKEN;
  return fetch("/api/analyze",{
    method:"POST",
    headers:headers,
    body:JSON.stringify({content:content})
  }).then(function(r){
    return r.json().catch(function(){return {};}).then(function(data){
      if(!r.ok){ throw new Error((data&&data.error)?data.error:("HTTP "+r.status)); }
      return data.text||"";
    });
  });
}
function callApiWithRetry(content){
  return callApi(content).catch(function(e){
    if(/HTTP (429|503|529)/.test(e.message)){return new Promise(function(res){setTimeout(res,1600);}).then(function(){return callApi(content);});}
    throw e;
  });
}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}

/* ---------- analyze ---------- */
function analyze(){
  if(!state.image) return;
  state.loading=true; state.progress=null; state.result=null;
  clearError(); renderResults(); renderUpload();

  var groups=[];
  for(var i=0;i<state.image.slices.length;i+=SLICES_PER_CALL) groups.push(state.image.slices.slice(i,i+SLICES_PER_CALL));

  var all=[],tk=[],te=[];
  var chain=Promise.resolve();
  groups.forEach(function(grp,g){
    chain=chain.then(function(){
      state.progress={cur:g+1,total:groups.length}; setAnalyzeBtn();
      var content=grp.map(function(b64){return {type:"image",source:{type:"base64",media_type:state.image.mediaType,data:b64}};});
      content.push({type:"text",text:"These are vertical slice(s) "+(g+1)+" of "+groups.length+" of one continuous Korean cosmetics detail page, top to bottom. Product type: "+($("ptInput")&&$("ptInput").value?$("ptInput").value:"not specified")+". Find FDA-problematic marketing claims in THESE slice(s) only and return ONLY the JSON object from the system schema (KO+EN, concise, max 6 claims)."});
      return callApiWithRetry(content).then(function(raw){
        var r=parseChunk(raw);
        all=all.concat(r.claims||[]); tk=tk.concat(r.tips_ko||[]); te=te.concat(r.tips_en||[]);
        if(g<groups.length-1) return sleep(350);
      });
    });
  });

  chain.then(function(){
    var seen={},claims=[];
    all.forEach(function(c){
      if(!c||!c.original)return;
      var k=String(c.original).replace(/\s+/g,"").toLowerCase().slice(0,40);
      if(seen[k])return; seen[k]=1; claims.push(c);
    });
    var sev={high:3,medium:2,low:1,ok:0},maxv=0;
    claims.forEach(function(c){var v=sev[c.risk]!=null?sev[c.risk]:1;if(v>maxv)maxv=v;});
    var n=claims.length;
    var overall = n===0?"compliant":(maxv>=3?"high":(maxv>=2?"medium":"low"));
    var h=claims.filter(function(c){return c.risk==="high";}).length;
    var m=claims.filter(function(c){return c.risk==="medium";}).length;
    var l=claims.filter(function(c){return c.risk==="low"||c.risk==="ok";}).length;
    var sko = n===0?STR.noClaims.ko:("\ucd1d "+n+"\uac1c\uc758 \ud45c\ud604\uc744 \uac80\ud1a0\ud588\uc2b5\ub2c8\ub2e4 \u2014 \uace0\uc704\ud5d8 "+h+" \u00b7 \uc911\uc704\ud5d8 "+m+" \u00b7 \ub0ae\uc74c "+l+". \uc758\uc57d\ud488\uc801\u00b7\uc9c8\ubcd1\u00b7\uc548\uc804\uc131 \ud45c\ud604 \uc704\uc8fc\ub85c \uc218\uc815\uc774 \ud544\uc694\ud569\ub2c8\ub2e4.");
    var sen = n===0?STR.noClaims.en:("Reviewed "+n+" claims \u2014 "+h+" high, "+m+" medium, "+l+" low. Focus rewrites on drug / disease / safety-style wording.");
    function dedupe(arr){var s={},o=[];arr.forEach(function(x){var k=String(x).replace(/\s+/g,"").toLowerCase();if(x&&!s[k]){s[k]=1;o.push(x);}});return o.slice(0,4);}
    state.result={overall_risk:overall,summary_ko:sko,summary_en:sen,claims:claims,tips_ko:dedupe(tk),tips_en:dedupe(te)};
    state.loading=false; state.progress=null;
    renderUpload(); renderResults();
  }).catch(function(e){
    state.loading=false; state.progress=null;
    renderUpload();
    showError((e&&e.message)||"error");
  });
}

  var ovIcon = r.overall_risk==="compliant"?IC.shield:(r.overall_risk==="high"?IC.alert:IC.info);
  var claims=r.claims||[];

  var html="";
  /* verdict */
  html+='<div class="card verdict">'+
    '<div class="vbar" style="background:'+ov.bar+'"></div>'+
    '<div class="vbody">'+
      '<div class="vicon" style="background:'+ov.bg+';color:'+ov.tx+'">'+ovIcon+'</div>'+
      '<div style="flex:1">'+

        '<p class="vsum">'+bi(r.summary_ko,r.summary_en)+'</p>'+

    '</div></div>';

  /* findings */
  html+='<div><h2 class="sec">'+esc(tr("findings"))+'<span class="count">'+claims.length+'</span></h2></div>';

  if(claims.length===0){
    html+='<div class="ok-card">'+IC.check+esc(tr("noClaims"))+'</div>';
  }else{
    claims.forEach(function(c){
      var rs=RISK[c.risk]||RISK.low;
      var basis=(c.fda_basis_ko||c.fda_basis_en)?('<p class="basis"><b>'+esc(tr("basis"))+':</b> '+bi(c.fda_basis_ko,c.fda_basis_en)+'</p>'):"";
      html+='<div class="card claim" style="border-left-color:'+rs.bd+'">'+
        '<div class="chead"><span class="pill" style="background:'+rs.bg+';color:'+rs.tx+'">'+rs[state.lang==="en"?"en":"ko"]+' \u00b7 '+bi(c.category_ko,c.category_en)+'</span></div>'+
        '<div class="redline">'+
          '<div class="box box-orig"><div class="bl">'+esc(tr("original"))+'</div><p>'+esc(c.original)+'</p></div>'+
          '<div class="arrow">'+IC.arrow+'</div>'+
          '<div class="box box-new"><div class="bl">'+esc(tr("rewrite"))+'</div><p>'+bi(c.suggestion_ko,c.suggestion_en)+'</p></div>'+
        '</div>'+
        '<div class="expl"><p class="li"><b>'+esc(tr("issue"))+':</b> '+bi(c.issue_ko,c.issue_en)+'</p>'+basis+'</div>'+
      '</div>';
    });
  }

  /* tips */
  var tips = state.lang==="en"?(r.tips_en||[]):(r.tips_ko||[]);
  if(tips.length){
    html+='<div class="card pad tips"><div class="row" style="gap:8px;font-weight:600;font-size:13.5px"><span style="color:var(--accent);display:inline-flex;width:16px">'+IC.info+'</span>'+esc(tr("tips"))+'</div><ul>';
    tips.forEach(function(tip,i){
      var sub = (state.lang==="both"&&r.tips_en&&r.tips_en[i])?('<span class="sub">'+esc(r.tips_en[i])+"</span>"):"";
      html+='<li><span>'+esc(tip)+sub+'</span></li>';
    });
    html+='</ul></div>';
  }

  html+='<div><button class="btn btn-line" id="againBtn">'+IC.refresh+esc(tr("again"))+'</button></div>';

  box.innerHTML=html; box.style.display="flex";
  if($("againBtn")) $("againBtn").addEventListener("click",resetAll);
}

/* ---------- actions ---------- */
function handleFile(file){
  if(!file||file.type.indexOf("image/")!==0){ showError(tr("badFile")); return; }
  state.preparing=true; state.image=null; state.result=null; clearError();
  renderUpload(); renderResults();
  prepareImage(file).then(function(p){
    state.preparing=false; state.image=p; renderUpload();
  }).catch(function(){
    state.preparing=false; renderUpload(); showError(tr("prepFail"));
  });
}
function resetAll(){
  state.image=null; state.result=null; state.preparing=false; clearError();
  renderUpload(); renderResults();
}

/* ---------- Google Drive ---------- */
function googleReady(){ return typeof window.google!=="undefined" && window.google.accounts && window.google.accounts.oauth2; }

function setupTokenClient(){
  if(!state.clientId || !googleReady()) return false;
  tokenClient = window.google.accounts.oauth2.initTokenClient({
    client_id: state.clientId,
    scope: DRIVE_SCOPE,
    callback: function(resp){
      if(resp && resp.access_token){
        state.accessToken = resp.access_token;
        state.driveConnected = true;
        setDriveStatus();
        renderDriveMsg(null);
      }
    }
  });
  return true;
}

function connectDrive(){
  if(!state.clientId){ openDrive(true); renderDriveMsg({type:"err",text:tr("driveNeedClientId")}); return; }
  if(!tokenClient){ if(!setupTokenClient()){ renderDriveMsg({type:"err",text:tr("driveNoLib")}); return; } }
  tokenClient.requestAccessToken({ prompt: state.accessToken ? "" : "consent" });
}

function driveFetch(url, opts){
  opts = opts || {};
  opts.headers = opts.headers || {};
  opts.headers.Authorization = "Bearer " + state.accessToken;
  return fetch(url, opts).then(function(r){
    if(r.status===401){ state.accessToken=null; state.driveConnected=false; setDriveStatus(); throw new Error("AUTH"); }
    if(!r.ok){ return r.text().catch(function(){return "";}).then(function(b){ throw new Error("Drive HTTP "+r.status+(b?(" \u00b7 "+b.slice(0,140)):"")); }); }
    return r.json();
  });
}

function ensureFolder(){
  if(state.driveFolderId) return Promise.resolve(state.driveFolderId);
  var q = encodeURIComponent("name='"+DRIVE_FOLDER_NAME+"' and mimeType='application/vnd.google-apps.folder' and trashed=false");
  return driveFetch("https://www.googleapis.com/drive/v3/files?q="+q+"&fields=files(id,name)&spaces=drive").then(function(d){
    if(d.files && d.files.length){ state.driveFolderId=d.files[0].id; return state.driveFolderId; }
    return driveFetch("https://www.googleapis.com/drive/v3/files?fields=id", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ name:DRIVE_FOLDER_NAME, mimeType:"application/vnd.google-apps.folder" })
    }).then(function(f){ state.driveFolderId=f.id; return f.id; });
  });
}

function dataUrlToBlob(dataUrl){
  var parts=dataUrl.split(","); var mime=(parts[0].match(/data:(.*?);/)||[])[1]||"application/octet-stream";
  var bin=atob(parts[1]); var arr=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

function driveUpload(name, fileBlob, parentId, convertMime){
  var metadata={ name:name, parents:[parentId] };
  if(convertMime) metadata.mimeType=convertMime;
  var form=new FormData();
  form.append("metadata", new Blob([JSON.stringify(metadata)], {type:"application/json"}));
  form.append("file", fileBlob);
  return driveFetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink", { method:"POST", body:form });
}

function tsStamp(){
  var d=new Date(), p=function(x){return (x<10?"0":"")+x;};
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+"_"+p(d.getHours())+p(d.getMinutes());
}

function buildReportHtml(){
  var r=state.result; var pt=($("ptInput")&&$("ptInput").value)?$("ptInput").value:"";
  var ovk=RISK[r.overall_risk]?RISK[r.overall_risk].ko:""; var ove=RISK[r.overall_risk]?RISK[r.overall_risk].en:"";
  var rows="";
  (r.claims||[]).forEach(function(c){
    var rk=RISK[c.risk]?RISK[c.risk].ko:c.risk, re2=RISK[c.risk]?RISK[c.risk].en:c.risk;
    rows+="<tr>"+
      "<td><b>"+esc(rk)+" / "+esc(re2)+"</b></td>"+
      "<td>"+esc(c.original)+"</td>"+
      "<td>"+esc(c.suggestion_ko)+"<br>"+esc(c.suggestion_en)+"</td>"+
      "<td>"+esc(c.issue_ko)+"<br>"+esc(c.issue_en)+"<br><i>"+esc(c.fda_basis_ko||"")+" / "+esc(c.fda_basis_en||"")+"</i></td>"+
      "</tr>";
  });
  var tips="";
  (r.tips_ko||[]).forEach(function(tp,i){ tips+="<li>"+esc(tp)+(r.tips_en&&r.tips_en[i]?(" / "+esc(r.tips_en[i])):"")+"</li>"; });
  var head="<h1>FDA Cosmetics Claim Report</h1>"+
    "<p><b>Date:</b> "+esc(new Date().toLocaleString())+"<br>"+
    (pt?("<b>Product:</b> "+esc(pt)+"<br>"):"")+
    "<b>Overall / \uc885\ud569:</b> "+esc(ovk)+" / "+esc(ove)+"</p>"+
    "<p><b>\uc694\uc57d:</b> "+esc(r.summary_ko)+"<br><b>Summary:</b> "+esc(r.summary_en)+"</p>";
  var table = rows ? ("<h2>Findings \uac80\ud1a0 \uacb0\uacfc</h2><table border='1' cellpadding='6' cellspacing='0'><tr><th>Risk</th><th>Original \uc6d0\ubb38</th><th>Suggested rewrite \uc218\uc815\uc548</th><th>Issue \ubb38\uc81c\uc810 / FDA basis</th></tr>"+rows+"</table>") : "<p>\ubb38\uc81c \uc18c\uc9c0\uac00 \uc788\ub294 \ud45c\ud604\uc744 \ucc3e\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4. / No problematic claims detected.</p>";
  var tipBlock = tips ? ("<h2>Tips \ucef4\ud50c\ub77c\uc774\uc5b8\uc2a4 \ud301</h2><ul>"+tips+"</ul>") : "";
  var disc="<hr><p style='font-size:11px;color:#888'>"+esc(STR.disclaimer.ko)+"<br>"+esc(STR.disclaimer.en)+"</p>";
  return "<html><head><meta charset='utf-8'></head><body>"+head+table+tipBlock+disc+"</body></html>";
}

function saveToDrive(){
  if(!state.result) return;
  if(!state.clientId){ openDrive(true); renderDriveMsg({type:"err",text:tr("driveNeedClientId")}); return; }
  if(!state.driveConnected || !state.accessToken){ renderDriveMsg({type:"err",text:tr("driveNeedConnect")}); connectDrive(); return; }
  renderDriveMsg({type:"info",text:tr("driveSaving")});
  var pt=($("ptInput")&&$("ptInput").value)?$("ptInput").value:"\uc81c\ud488";
  var stamp=tsStamp();
  var docLink=null;
  ensureFolder().then(function(folderId){
    var reportBlob=new Blob([buildReportHtml()],{type:"text/html"});
    return driveUpload("FDA\ud074\ub808\uc784_"+pt+"_"+stamp, reportBlob, folderId, "application/vnd.google-apps.document").then(function(doc){
      docLink = doc.webViewLink;
      if(state.image && state.image.preview){
        var imgBlob=dataUrlToBlob(state.image.preview);
        var ext=(imgBlob.type.split("/")[1]||"jpg").replace("jpeg","jpg");
        return driveUpload(pt+"_\uc6d0\ubcf8_"+stamp+"."+ext, imgBlob, folderId, null);
      }
    });
  }).then(function(){
    var folderUrl = state.driveFolderId ? ("https://drive.google.com/drive/folders/"+state.driveFolderId) : null;
    renderDriveMsg({type:"ok", text:tr("driveSaved"), docLink:docLink, folderUrl:folderUrl});
  }).catch(function(e){
    if(e && e.message==="AUTH"){ renderDriveMsg({type:"err",text:tr("driveNeedConnect")}); connectDrive(); return; }
    renderDriveMsg({type:"err", text:((e&&e.message)||"error")});
  });
}

function maybeAutoSave(){
  if(state.autoSave && state.result && (state.result.claims||[]).length>=0){
    if(state.driveConnected && state.accessToken) saveToDrive();
  }
}

function renderDriveMsg(msg){
  state.driveMsg = msg;
  var el=$("driveMsgArea"); if(!el) return;
  if(!msg){ el.innerHTML=""; return; }
  var color = msg.type==="err" ? "var(--high-tx)" : (msg.type==="ok" ? "var(--ok-tx)" : "var(--ink2)");
  var links="";
  if(msg.docLink) links+=' <a class="dlink" target="_blank" rel="noopener" href="'+esc(msg.docLink)+'">'+esc(tr("driveOpenDoc"))+'</a>';
  if(msg.folderUrl) links+=' <a class="dlink" target="_blank" rel="noopener" href="'+esc(msg.folderUrl)+'">'+esc(tr("driveOpenFolder"))+'</a>';
  el.innerHTML='<div class="dstatus" style="color:'+color+'"><span>'+esc(msg.text)+'</span>'+links+'</div>';
}

/* ---------- init ---------- */
function init(){
  var savedKey=lsGet("anthropic_api_key"); if(savedKey) state.apiKey=savedKey;
  var savedLang=lsGet("ccc_lang"); if(savedLang==="ko"||savedLang==="en"||savedLang==="both") state.lang=savedLang;

  applyChrome(); setLangButtons(); renderUpload(); renderResults();

  $("seg").querySelectorAll("button").forEach(function(b){
    b.addEventListener("click",function(){
      state.lang=b.getAttribute("data-l"); lsSet("ccc_lang",state.lang);
      setLangButtons(); applyChrome(); renderUpload(); renderResults();
    });
  });

  $("fileInput").addEventListener("change",function(e){ if(e.target.files[0]) handleFile(e.target.files[0]); e.target.value=""; });
  window.addEventListener("paste",function(e){
    var items=e.clipboardData&&e.clipboardData.items; if(!items)return;
    for(var i=0;i<items.length;i++){ if(items[i].type&&items[i].type.indexOf("image/")===0){ var f=items[i].getAsFile(); if(f){ handleFile(f); break; } } }
  });

}
init();
</script>
